<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/01/svg">
  <!-- Background -->
  <rect width="512" height="512" fill="#0E1117"/>
  
  <!-- Industrial Grid Pattern (Subtle) -->
  <path d="M0 64H512M0 128H512M0 192H512M0 256H512M0 320H512M0 384H512M0 448H512" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <path d="M64 0V512M128 0V512M192 0V512M256 0V512M320 0V512M384 0V512M448 0V512" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>

  <!-- Main Logo Mark: Stylized 'F' + 'AI' + Validation Check -->
  <!-- Sharp edges, industrial look -->
  <path d="M120 120H400V180H180V240H360V300H180V400H120V120Z" fill="#00E676"/>
  
  <!-- AI / Digital Accent -->
  <rect x="300" y="340" width="100" height="60" fill="#00E676" fill-opacity="0.3"/>
  <path d="M300 340H400V400H300V340Z" stroke="#00E676" stroke-width="4"/>
  
  <!-- Success / Legal Tick -->
  <path d="M420 80L450 110L500 40" stroke="#00E676" stroke-width="12" stroke-linecap="square"/>
  
  <!-- Critical / Alert Accent (Small) -->
  <rect x="120" y="420" width="20" height="20" fill="#FF3D00"/>
